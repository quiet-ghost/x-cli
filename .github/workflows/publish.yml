name: publish
run-name: "release ${{ inputs.version || inputs.bump }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 0.1.0)
        required: false
        type: string
      bump:
        description: Semver bump to apply to the current package.json version
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version
        id: version
        env:
          XCLI_VERSION: ${{ inputs.version }}
          XCLI_BUMP: ${{ inputs.bump }}
        run: |
          if [ -z "${XCLI_VERSION}" ] && [ -z "${XCLI_BUMP}" ]; then
            echo "Provide either version or bump" >&2
            exit 1
          fi
          bun run script/version.ts

  publish:
    needs: version
    runs-on: ubuntu-latest
    env:
      XCLI_VERSION: ${{ needs.version.outputs.version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: |
          bun run typecheck
          bun test

      - name: Build release packages
        run: bun run build:release

      - name: Publish npm packages
        run: bun run publish:release

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "v${XCLI_VERSION}" >/dev/null 2>&1; then
            gh release upload "v${XCLI_VERSION}" dist/assets/* --clobber
          else
            if [ "${{ inputs.prerelease }}" = "true" ]; then
              gh release create "v${XCLI_VERSION}" dist/assets/* --title "v${XCLI_VERSION}" --generate-notes --prerelease
            else
              gh release create "v${XCLI_VERSION}" dist/assets/* --title "v${XCLI_VERSION}" --generate-notes
            fi
          fi
